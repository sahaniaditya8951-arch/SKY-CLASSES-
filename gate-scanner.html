<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Auto AI Scanner</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at 50% -20%, #1e293b, #020617 80%, #000);
            height: 100vh; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white;
        }
        
        .header {
            position: absolute; top: 0; left: 0; width: 100%; text-align: center; z-index: 10;
            padding: 20px 0; background: linear-gradient(180deg, rgba(2,6,23,0.9) 0%, transparent 100%);
        }
        .header h1 { 
            font-weight: 800; font-size: 38px; letter-spacing: 3px; margin: 0;
            background: linear-gradient(to right, #ffffff, #fbbf24);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* FLIP CAMERA BUTTON */
        .btn-camera {
            position: absolute; top: 25px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 15px; border-radius: 50px; backdrop-filter: blur(5px);
            cursor: pointer; transition: 0.3s; font-size: 14px; font-weight: 600;
        }
        .btn-camera:hover { background: rgba(255,255,255,0.2); }
        
        .live-badge {
            background: rgba(217, 4, 41, 0.15); color: #ff3366; padding: 6px 18px; 
            border-radius: 50px; border: 1px solid rgba(255, 51, 102, 0.3);
            font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 8px;
            margin-top: 10px; backdrop-filter: blur(5px);
        }
        .live-dot { width: 8px; height: 8px; background: #ff3366; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 51, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); } }

        .scanner-wrapper { position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; margin-top: 60px; }
        
        .scanner-container {
            position: relative; width: 85vw; max-width: 400px; aspect-ratio: 3/4; max-height: 60vh;
            border-radius: 24px; overflow: hidden; background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(251, 191, 36, 0.2);
            transition: box-shadow 0.3s ease;
        }
        
        video, canvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; border-radius: 24px;
            /* ScaleX JS se control hoga ab back/front camera ke hisab se */
        }
        
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px; 
            background: linear-gradient(to right, transparent, #fbbf24, transparent);
            box-shadow: 0 0 20px 2px #fbbf24; z-index: 5;
            animation: scan 2.5s ease-in-out infinite;
        }
        @keyframes scan { 0% { top: 5%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 95%; opacity: 0; } }

        .status-box {
            position: absolute; bottom: 30px; width: 90vw; max-width: 500px;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px);
            padding: 20px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #recognitionStatus { font-size: 18px; font-weight: 700; margin: 0; color: #fbbf24; transition: color 0.3s; }
        .hint-text { font-size: 13px; font-weight: 300; margin-top: 8px; color: #94a3b8; }
        
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #020617; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000;
        }
        .loader-ring {
            width: 80px; height: 80px; border: 4px solid rgba(251, 191, 36, 0.1);
            border-top: 4px solid #fbbf24; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingScreen">
        <div class="loader-ring"></div>
        <h3 class="fw-bold text-white mb-2">Starting Engine...</h3>
        <p class="text-muted" id="loadingText">Fetching Today's Records...</p>
    </div>

    <div class="header">
        <h1>SKY CLASSES</h1>
        <div class="live-badge"><div class="live-dot"></div> AUTO SMART GATE</div>
        <button class="btn-camera" onclick="toggleCamera()"><i class="fa-solid fa-camera-rotate me-1"></i> Flip</button>
    </div>

    <div class="scanner-wrapper">
        <div class="scanner-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="scan-line"></div>
        </div>
    </div>

    <div class="status-box">
        <p id="recognitionStatus"><i class="fa-solid fa-crosshairs fa-spin me-2" style="color: #94a3b8;"></i> Scanning Face...</p>
        <p class="hint-text"><i class="fa-regular fa-eye me-1"></i> Blink to mark attendance automatically</p>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
          authDomain: "sky-classes-db-d6140.firebaseapp.com",
          databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
          projectId: "sky-classes-db-d6140",
          storageBucket: "sky-classes-db-d6140.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('recognitionStatus');
        
        let faceMatcher = null;
        let studentHistory = {}; 
        let isProcessing = false; 
        
        // CAMERA TOGGLE LOGIC
        let useFrontCamera = true; // Default front camera

        function toggleCamera() {
            useFrontCamera = !useFrontCamera;
            
            // Purana camera band karna
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            
            // Naya camera chalu karna
            startVideo();
        }

        function speakAttendance(studentName, msg) {
            if ('speechSynthesis' in window) {
                const speech = new SpeechSynthesisUtterance(`${studentName}, ${msg}`);
                speech.lang = 'en-IN'; 
                window.speechSynthesis.speak(speech);
            }
        }

        function calculateEAR(eye) {
            const dist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
            return (dist(eye[1], eye[5]) + dist(eye[2], eye[4])) / (2.0 * dist(eye[0], eye[3]));
        }

        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        
        Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(fetchInitialData).catch(() => setTimeout(startVideo, 1000));

        function fetchInitialData() {
            const todayStr = new Date().toLocaleDateString('en-IN');
            
            db.ref('Daily_Attendance').once('value').then(snap => {
                snap.forEach(child => {
                    let record = child.val();
                    if(record.Date === todayStr) {
                        let phone = record.Phone;
                        if(!studentHistory[phone] || studentHistory[phone].Timestamp < record.Timestamp) {
                            studentHistory[phone] = { state: record.ScanType, Timestamp: record.Timestamp };
                        }
                    }
                });
                fetchRegisteredFaces();
            });
        }

        function fetchRegisteredFaces() {
            db.ref('Face_Data').once('value').then(snapshot => {
                const data = snapshot.val();
                if (!data) return startVideo();

                const labeledFaceDescriptors = [];
                for (const phone in data) {
                    const student = data[phone];
                    if (student && student.FaceDescriptor) {
                        try {
                            const floatArray = new Float32Array(Object.values(student.FaceDescriptor));
                            const label = student.Name + "||" + phone; 
                            labeledFaceDescriptors.push(new faceapi.LabeledFaceDescriptors(label, [floatArray]));
                        } catch (e) {}
                    }
                }
                if(labeledFaceDescriptors.length > 0) faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5);
                startVideo();
            });
        }

        function startVideo() {
            // Front ya Back camera select karna
            const mode = useFrontCamera ? "user" : "environment";
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } })
            .then(stream => { 
                video.srcObject = stream; 
                document.getElementById('loadingScreen').style.display = 'none';

                // Sirf front camera ko ulta (mirror) dikhana hai
                if(useFrontCamera) {
                    video.style.transform = "scaleX(-1)";
                    canvas.style.transform = "scaleX(-1)";
                } else {
                    video.style.transform = "scaleX(1)";
                    canvas.style.transform = "scaleX(1)";
                }
            })
            .catch(err => {
                console.log("Camera Switch Error: ", err);
                statusText.innerHTML = "Camera switch failed!";
            });
        }

        video.addEventListener('play', () => {
            const displaySize = { width: video.clientWidth || 380, height: video.clientHeight || 480 }; 
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                if (!faceMatcher || isProcessing) return;

                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                if(resizedDetections.length === 0) {
                    statusText.innerHTML = "Scanning Area...";
                    statusText.style.color = "#fbbf24";
                    document.querySelector('.scanner-container').style.boxShadow = "0 20px 50px rgba(0,0,0,0.5), 0 0 0 2px rgba(251, 191, 36, 0.2)";
                    return;
                }

                resizedDetections.forEach((detection) => {
                    const result = faceMatcher.findBestMatch(detection.descriptor);
                    
                    if (result.label !== 'unknown') {
                        const splitData = result.label.split("||");
                        const name = splitData[0];
                        const phone = splitData[1];

                        const leftEye = detection.landmarks.getLeftEye();
                        const rightEye = detection.landmarks.getRightEye();
                        const ear = (calculateEAR(leftEye) + calculateEAR(rightEye)) / 2;

                        const nowTime = Date.now();
                        let lastRecord = studentHistory[phone] || { state: "OUT", Timestamp: 0 };

                        if (lastRecord.state === "OUT" && lastRecord.Timestamp !== 0) {
                            statusText.innerHTML = `<i class='fa-solid fa-check-double me-2'></i> ${name}, Aaj ka Attendance Pura!`;
                            statusText.style.color = "#10b981"; 
                            document.querySelector('.scanner-container').style.boxShadow = "0 20px 50px rgba(16, 185, 129, 0.3), 0 0 0 2px #10b981";
                            return; 
                        }

                        if (nowTime - lastRecord.Timestamp < 300000 && lastRecord.Timestamp !== 0) {
                            statusText.innerHTML = `<i class='fa-solid fa-ban me-2'></i> ${name}, Wait 5 Mins for EXIT!`;
                            statusText.style.color = "#f43f5e";
                            return;
                        }

                        let upcomingMode = lastRecord.state === "IN" ? "EXIT" : "ENTRY";

                        if (ear < 0.28) {
                            isProcessing = true; 
                            markAttendance(name, phone, upcomingMode);
                            setTimeout(() => { isProcessing = false; }, 3500); 
                        } else {
                            statusText.innerHTML = `${name} Identified. Blink for ${upcomingMode}!`;
                            statusText.style.color = "#38bdf8"; 
                            document.querySelector('.scanner-container').style.boxShadow = "0 20px 50px rgba(56, 189, 248, 0.3), 0 0 0 2px #38bdf8";
                        }
                    } 
                    else {
                        statusText.innerHTML = `<i class='fa-solid fa-user-secret me-2'></i> UNKNOWN PERSON!`;
                        statusText.style.color = "#f43f5e"; 
                        document.querySelector('.scanner-container').style.boxShadow = "0 20px 50px rgba(244, 63, 94, 0.3), 0 0 0 4px #f43f5e"; 
                    }
                });
            }, 250); 
        });

        function markAttendance(name, phone, mode) {
            const nowTime = Date.now();
            studentHistory[phone] = { state: mode === "ENTRY" ? "IN" : "OUT", Timestamp: nowTime };
            
            let color = mode === "ENTRY" ? "#10b981" : "#f43f5e"; 
            statusText.innerHTML = `<i class='fa-solid fa-fingerprint me-2'></i> ${mode} Saved: ${name}`;
            statusText.style.color = color;
            document.querySelector('.scanner-container').style.boxShadow = `0 20px 50px ${color}66, 0 0 0 3px ${color}`;

            speakAttendance(name, mode + " Successful");

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN'); 
            const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            db.ref('Daily_Attendance').push({
                Name: name,
                Phone: phone,
                Date: dateStr,
                Time: timeStr,
                Timestamp: nowTime,
                ScanType: mode === "ENTRY" ? "IN" : "OUT"
            });
        }
    </script>
</body>
</html>
