<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Face Attendance</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        :root { --red: #D90429; --green: #28a745; --gold: #E6B31E; }
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

        /* Top Bar Branding */
        .top-header { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: flex-start; z-index: 100; }
        .branding h1 { font-size: 1.5rem; margin: 0; color: var(--gold); letter-spacing: 1px; }
        #status { font-weight: 800; font-size: 1rem; color: var(--red); display: block; margin-top: 5px; }
        .aadhaar-box { text-align: right; opacity: 0.8; font-size: 12px; font-weight: bold; }

        /* Mode Switcher */
        .modes { position: absolute; top: 100px; display: flex; gap: 15px; z-index: 100; }
        .mode-btn { border: 2.5px solid rgba(255,255,255,0.3); padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 800; transition: 0.3s; font-size: 14px; }
        .active-in { border-color: var(--green); color: var(--green); box-shadow: 0 0 15px var(--green); opacity: 1; }
        .active-out { border-color: var(--red); color: var(--red); box-shadow: 0 0 15px var(--red); opacity: 1; }

        /* MEGA CIRCLE UI */
        .scanner-container { position: relative; width: 420px; height: 420px; margin-top: 60px; }
        .circle-ring { 
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid var(--red); 
            overflow: hidden; position: relative; transition: 0.3s; background: #111;
        }
        .circle-ring.success { border-color: var(--green); box-shadow: 0 0 60px rgba(40, 167, 69, 0.8); transform: scale(1.03); }
        
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Hindi Overlay text */
        .hindi-text { 
            position: absolute; bottom: 40px; width: 100%; text-align: center; 
            font-size: 30px; font-weight: 900; color: white; z-index: 110;
            text-shadow: -3px -3px 0 var(--red), 3px -3px 0 var(--red), -3px 3px 0 var(--red), 3px 3px 0 var(--red);
        }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="branding">
            <h1>SKY CLASSES FACE ATTENDANCE</h1>
            <span id="status">Starting Camera...</span>
        </div>
        <div class="aadhaar-box">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/cf/Aadhaar_Logo.svg/1200px-Aadhaar_Logo.svg.png" width="35"><br>
            AADHAAR AUTH v1.33
        </div>
    </div>

    <div class="modes">
        <div id="btnIn" class="mode-btn active-in" onclick="setMode('IN')">ENTRY (IN)</div>
        <div id="btnOut" class="mode-btn" onclick="setMode('OUT')">EXIT (OUT)</div>
    </div>

    <div class="scanner-container">
        <div class="circle-ring" id="mainRing">
            <video id="video" autoplay playsinline muted></video>
            <div class="hindi-text">उधास होके नही जाने देना है</div>
        </div>
    </div>

    <script>
        let currentMode = 'IN';
        let isProcessing = false;
        const statusText = document.getElementById('status');
        const videoEl = document.getElementById('video');

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
            authDomain: "sky-classes-db-d6140.firebaseapp.com",
            databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
            projectId: "sky-classes-db-d6140",
            storageBucket: "sky-classes-db-d6140.firebasestorage.app",
            messagingSenderId: "915411828634",
            appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function setMode(m) {
            currentMode = m;
            document.getElementById('btnIn').className = m === 'IN' ? 'mode-btn active-in' : 'mode-btn';
            document.getElementById('btnOut').className = m === 'OUT' ? 'mode-btn active-out' : 'mode-btn';
        }

        // 1. Camera chalu karna
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { 
                videoEl.srcObject = stream;
                statusText.innerText = "Loading AI Models...";
                statusText.style.color = "var(--gold)";
                loadAI(); 
            })
            .catch(err => {
                statusText.innerText = "Camera Error!";
                alert("Camera permission allow karein!");
            });

        // 2. AI Model load aur Auto-Scan karna
        async function loadAI() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            
            statusText.innerText = "Scanning... Face the camera";
            statusText.style.color = "white";

            // Loop jo lagatar chehra dhoondhega
            setInterval(async () => {
                if (isProcessing) return; // Agar attendance lag rahi hai to dubara scan mat karo

                const detections = await faceapi.detectAllFaces(videoEl, new faceapi.TinyFaceDetectorOptions());
                
                if (detections.length > 0) {
                    // Chehra mil gaya, ab attendance lagao
                    markAttendance("Aditya Sahani", "8840428581");
                }
            }, 1000); 
        }

        // 3. Asli Attendance aur Firebase save function
        function markAttendance(studentName, phone) {
            isProcessing = true; // Scanner ko thodi der ke liye roko
            const ring = document.getElementById('mainRing');
            
            // UI ko Green karo aur Naam dikhao
            ring.classList.add('success');
            statusText.innerText = `MARKING ${currentMode} : ${studentName}`;
            statusText.style.color = "var(--green)";

            const dateKey = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
            const timeVal = new Date().toLocaleTimeString('en-IN');

            // Firebase mein Entry Save
            db.ref(`Face_Data/${phone}/Attendance/${dateKey}`).update({ 
                [currentMode]: timeVal 
            }).then(() => {
                // Jab data save ho jaye tab aawaz aaye
                speak(`${studentName}, your ${currentMode} attendance is done. Thank you.`);
            }).catch(error => {
                statusText.innerText = "Database Error!";
                statusText.style.color = "var(--red)";
            });

            // 4 Second baad sab normal kar do naye bacche ke liye
            setTimeout(() => {
                ring.classList.remove('success');
                statusText.innerText = "Scanning... Face the camera";
                statusText.style.color = "white";
                isProcessing = false; 
            }, 4000);
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
