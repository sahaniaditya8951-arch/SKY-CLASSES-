<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | AI Gate Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        :root { --red: #D90429; --green: #28a745; }
        body { background: #000; color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

        .top-bar { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #status { font-weight: 800; font-size: 1.1rem; color: var(--red); }
        
        .modes { position: absolute; top: 80px; display: flex; gap: 10px; z-index: 100; }
        .mode-btn { border: 2px solid white; padding: 8px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; opacity: 0.5; }
        .active-in { border-color: var(--green); color: var(--green); opacity: 1; }
        .active-out { border-color: var(--red); color: var(--red); opacity: 1; }

        .scanner-container { position: relative; width: 340px; height: 340px; margin-top: 40px; }
        .circle { 
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--red); 
            overflow: hidden; position: relative; transition: 0.4s; background: #111;
        }
        .circle.success { border-color: var(--green); box-shadow: 0 0 40px var(--green); }
        
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .overlay-text { 
            position: absolute; bottom: 20px; width: 100%; text-align: center; 
            font-size: 24px; font-weight: 800; color: white; z-index: 110;
            text-shadow: -2px -2px 0 var(--red), 2px -2px 0 var(--red), -2px 2px 0 var(--red), 2px 2px 0 var(--red);
        }
        
        /* Debug Info */
        #error-msg { position: absolute; bottom: 80px; color: yellow; font-size: 12px; text-align: center; width: 90%; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="status">PLEASE WAIT...</div>
        <div style="text-align:right">AADHAAR AUTH<br><small>v1.33</small></div>
    </div>

    <div class="modes">
        <div id="btnIn" class="mode-btn active-in" onclick="setMode('IN')">ENTRY (IN)</div>
        <div id="btnOut" class="mode-btn" onclick="setMode('OUT')">EXIT (OUT)</div>
    </div>

    <div class="scanner-container">
        <div class="circle" id="mainCircle">
            <video id="video" autoplay playsinline muted></video>
            <div class="overlay-text">उधास होके नही जाने देना है</div>
        </div>
    </div>

    <div id="error-msg"></div>

    <script>
        let currentMode = 'IN';
        let isProcessing = false;
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error-msg');

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
            authDomain: "sky-classes-db-d6140.firebaseapp.com",
            databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
            projectId: "sky-classes-db-d6140",
            storageBucket: "sky-classes-db-d6140.firebasestorage.app",
            messagingSenderId: "915411828634",
            appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function setMode(m) {
            currentMode = m;
            document.getElementById('btnIn').className = m === 'IN' ? 'mode-btn active-in' : 'mode-btn';
            document.getElementById('btnOut').className = m === 'OUT' ? 'mode-btn active-out' : 'mode-btn';
        }

        async function initAI() {
            try {
                statusEl.innerText = "LOADING MODELS...";
                const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                
                statusEl.innerText = "STARTING CAMERA...";
                startVideo();
            } catch (err) {
                errorEl.innerText = "Model Load Error: " + err.message;
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => { 
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        statusEl.innerText = "SCANNING FACE...";
                        statusEl.style.color = "var(--green)";
                        startDetection();
                    };
                })
                .catch(err => {
                    errorEl.innerText = "Camera Error: Please allow camera access.";
                    statusEl.innerText = "CAMERA BLOCKED";
                });
        }

        async function startDetection() {
            const video = document.getElementById('video');
            setInterval(async () => {
                if (isProcessing) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                
                if (detections.length > 0) {
                    // Success logic
                    handleAttendance("Aditya Sahani", "8840428581");
                }
            }, 1500);
        }

        async function handleAttendance(name, phone) {
            isProcessing = true;
            const circle = document.getElementById('mainCircle');
            circle.classList.add('success');
            statusEl.innerText = "MATCH FOUND!";

            const today = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
            const time = new Date().toLocaleTimeString();

            try {
                await db.ref(`Face_Data/${phone}/Attendance/${today}`).update({ [currentMode]: time });
                speak(`${name}, Your ${currentMode} attendance is marked. Thank you!`);
            } catch (e) {
                console.error(e);
            }

            setTimeout(() => {
                circle.classList.remove('success');
                statusEl.innerText = "SCANNING FACE...";
                isProcessing = false;
            }, 4000);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1;
            window.speechSynthesis.speak(msg);
        }

        // Run on load
        window.onload = initAI;
    </script>
</body>
</html>
