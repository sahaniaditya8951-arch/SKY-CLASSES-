<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Gate Face Scanner v1.33</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --status-red: #D90429;
            --status-green: #28a745;
            --sky-dark: #07192F;
        }

        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Top Bar Styling --- */
        .scanner-top-bar {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            position: absolute;
            top: 10px;
        }
        .status-text { font-weight: 700; transition: 0.3s; }
        .status-red { color: var(--status-red); }
        .status-green { color: var(--status-green); text-shadow: 0 0 10px var(--status-green); }
        
        .aadhaar-auth-title { text-align: right; font-size: 14px; opacity: 0.8; }
        .version-small { display: block; font-size: 10px; font-weight: 400; }

        /* --- IN/OUT Mode Switcher --- */
        .mode-container {
            position: absolute;
            top: 80px;
            z-index: 10;
        }
        .btn-check:checked + .btn-outline-success { background-color: var(--status-green); color: white; border-color: var(--status-green); }
        .btn-check:checked + .btn-outline-danger { background-color: var(--status-red); color: white; border-color: var(--status-red); }

        /* --- Main Circular Scanner (THE BAVAL PART) --- */
        .camera-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin-top: 40px;
        }

        .camera-circle-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            border: 8px solid var(--status-red); /* Default Red */
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            box-shadow: 0 0 20px rgba(217, 4, 41, 0.3);
        }

        /* Success State for Ring */
        .camera-circle-container.success-ring {
            border-color: var(--status-green);
            box-shadow: 0 0 40px rgba(40, 167, 69, 0.6);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
        }

        /* --- Hindi Text Overlay (Exact as Image) --- */
        .hindi-overlay-text {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: 800;
            white-space: nowrap;
            z-index: 100;
            /* White text with thick Red outline */
            text-shadow: 
                -3px -3px 0 var(--status-red), 3px -3px 0 var(--status-red),
                -3px 3px 0 var(--status-red), 3px 3px 0 var(--status-red),
                0px 0px 15px rgba(0,0,0,0.5);
        }

        /* --- Bottom Bar --- */
        .scanner-bottom-bar {
            position: absolute;
            bottom: 30px;
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            opacity: 0.6;
        }
        .btn-refresh { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="scanner-top-bar">
        <div id="statusLabel" class="status-text status-red">Face Not Detected</div>
        <div class="aadhaar-auth-title text-uppercase">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/cf/Aadhaar_Logo.svg/1200px-Aadhaar_Logo.svg.png" width="30" class="mb-1"><br>
            Aadhaar Auth <span class="version-small">v1.33</span>
        </div>
    </div>

    <div class="mode-container d-flex gap-2">
        <input type="radio" class="btn-check" name="gateMode" id="modeIn" value="IN" checked>
        <label class="btn btn-outline-success btn-sm px-3 fw-bold rounded-pill" for="modeIn">ENTRY (IN)</label>

        <input type="radio" class="btn-check" name="gateMode" id="modeOut" value="OUT">
        <label class="btn btn-outline-danger btn-sm px-3 fw-bold rounded-pill" for="modeOut">EXIT (OUT)</label>
    </div>

    <div class="camera-wrapper">
        <div class="camera-circle-container" id="ring">
            <video id="webcam" autoplay muted></video>
            <div class="hindi-overlay-text">उधास होके नही जाने देना है</div>
        </div>
    </div>

    <div class="scanner-bottom-bar">
        <button class="btn-refresh" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i></button>
        <div id="clock" class="small fw-bold">00:00:00</div>
    </div>

    <audio id="beepSuccess" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
    <audio id="beepError" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <script>
        // --- 1. Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
            authDomain: "sky-classes-db-d6140.firebaseapp.com",
            databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
            projectId: "sky-classes-db-d6140",
            storageBucket: "sky-classes-db-d6140.firebasestorage.app",
            messagingSenderId: "915411828634",
            appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. Camera Setup ---
        const video = document.getElementById('webcam');
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Camera Access Denied:", err);
                alert("Bhai, camera chalu nahi ho raha!");
            }
        }
        startCamera();

        // --- 3. Live Clock ---
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // --- 4. Core Attendance Logic (Baval Animation & Sound) ---
        function markAttendance(phone, studentName) {
            const today = new Date().toLocaleDateString('en-GB').replace(/\//g, "-");
            const currentTime = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            const selectedMode = document.querySelector('input[name="gateMode"]:checked').value;
            
            const ring = document.getElementById('ring');
            const statusLabel = document.getElementById('statusLabel');

            // Save to Firebase
            db.ref(`Face_Data/${phone}/Attendance/${today}`).update({
                [selectedMode]: currentTime
            }).then(() => {
                // UI Feedback (Baval Look)
                ring.classList.add('success-ring');
                statusLabel.innerText = `${selectedMode} SUCCESS: ${studentName}`;
                statusLabel.classList.remove('status-red');
                statusLabel.classList.add('status-green');
                
                document.getElementById('beepSuccess').play();

                // Reset back after 3 seconds
                setTimeout(() => {
                    ring.classList.remove('success-ring');
                    statusLabel.innerText = "Face Not Detected";
                    statusLabel.classList.remove('status-green');
                    statusLabel.classList.add('status-red');
                }, 3000);
            }).catch((err) => {
                document.getElementById('beepError').play();
                alert("Database Error!");
            });
        }

        // --- NOTE FOR ADITYA ---
        // Aapne jo bhi Face API library use ki hai, uske 'detection' wale 
        // loop ke andar bas ye function call kar dena:
        // Example: markAttendance("9876543210", "Rahul Kumar");
    </script>
</body>
</html>
