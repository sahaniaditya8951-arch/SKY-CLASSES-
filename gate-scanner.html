<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | AI Gate Scanner</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #000; 
            height: 100vh; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .header {
            position: absolute; top: 20px; left: 0; width: 100%; text-align: center; z-index: 10;
        }
        .header h1 { color: white; font-weight: 800; font-size: 35px; letter-spacing: 2px; text-shadow: 0 0 15px rgba(230, 179, 30, 0.5); }
        .header h1 span { color: #E6B31E; }
        .live-badge {
            background: #D90429; color: white; padding: 5px 15px; border-radius: 50px; 
            font-size: 14px; font-weight: bold; display: inline-block; animation: blink 2s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .mode-toggle {
            display: flex; gap: 20px; margin-bottom: 20px; z-index: 10; margin-top: 80px;
        }
        .mode-toggle input { display: none; }
        .mode-label {
            padding: 10px 30px; border-radius: 50px; font-weight: bold; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3); color: white; transition: 0.3s; font-size: 16px;
        }
        #modeIn:checked + .in-label { border-color: #28a745; background: rgba(40,167,69,0.2); color: #28a745; box-shadow: 0 0 15px #28a745; }
        #modeOut:checked + .out-label { border-color: #D90429; background: rgba(217,4,41,0.2); color: #D90429; box-shadow: 0 0 15px #D90429; }

        .scanner-container {
            position: relative; width: 350px; height: 350px; 
            border: 5px solid #E6B31E; border-radius: 50%; overflow: hidden;
            box-shadow: 0 0 40px rgba(230, 179, 30, 0.4);
            margin-bottom: 20px;
        }
        
        video, canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: #E6B31E;
            box-shadow: 0 0 15px #E6B31E, 0 0 30px #E6B31E; opacity: 0.7; z-index: 5;
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .status-box {
            position: absolute; bottom: 30px; width: 90vw; max-width: 600px;
            background: rgba(10, 37, 64, 0.9); padding: 20px; border-radius: 15px;
            text-align: center; color: white; border: 1px solid #1a365d;
        }
        #recognitionStatus { font-size: 24px; font-weight: 700; margin: 0; color: #E6B31E; }
        
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #07192F;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingScreen">
        <i class="fa-solid fa-satellite-dish fa-spin" style="font-size: 60px; color: #E6B31E; margin-bottom: 20px;"></i>
        <h2 class="fw-bold">Initializing Gate Scanner...</h2>
        <p class="text-muted" id="loadingText">Please wait, loading AI Models...</p>
    </div>

    <div class="header">
        <h1>SKY <span>CLASSES</span></h1>
        <div class="live-badge"><i class="fa-solid fa-record-vinyl me-2"></i> AI GATE SCANNER LIVE</div>
    </div>

    <div class="mode-toggle">
        <input type="radio" name="gateMode" id="modeIn" value="IN" checked onchange="updateMode(this)">
        <label for="modeIn" class="mode-label in-label"><i class="fa-solid fa-arrow-right-to-bracket me-1"></i> ENTRY (IN)</label>

        <input type="radio" name="gateMode" id="modeOut" value="OUT" onchange="updateMode(this)">
        <label for="modeOut" class="mode-label out-label"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i> EXIT (OUT)</label>
    </div>

    <div class="scanner-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="scan-line"></div>
    </div>

    <div class="status-box">
        <p id="recognitionStatus"><i class="fa-solid fa-face-viewfinder me-2"></i> Looking for students...</p>
        <p style="font-size: 14px; margin-top: 10px; color: #ccc;">Aankh jhapakna (Blink) zaroori hai</p>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
          authDomain: "sky-classes-db-d6140.firebaseapp.com",
          databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
          projectId: "sky-classes-db-d6140",
          storageBucket: "sky-classes-db-d6140.firebasestorage.app",
          messagingSenderId: "915411828634",
          appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('recognitionStatus');
        const loadingText = document.getElementById('loadingText');
        
        let faceMatcher = null;
        let recentlyScanned = {}; 
        let currentMode = "IN"; 

        function updateMode(radio) {
            currentMode = radio.value;
            statusText.innerHTML = `<i class='fa-solid fa-exchange-alt me-2'></i> Mode changed to: ${currentMode}`;
            statusText.style.color = "#E6B31E";
        }

        function speakAttendance(studentName) {
            if ('speechSynthesis' in window) {
                const speech = new SpeechSynthesisUtterance(`${studentName}, Present. Thank you!`);
                speech.lang = 'en-IN'; 
                speech.rate = 1.1;
                window.speechSynthesis.speak(speech);
            }
        }

        function calculateEAR(eye) {
            const dist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
            const v1 = dist(eye[1], eye[5]);
            const v2 = dist(eye[2], eye[4]);
            const h = dist(eye[0], eye[3]);
            return (v1 + v2) / (2.0 * h);
        }

        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        
        Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(fetchRegisteredFaces).catch(err => {
            loadingText.innerHTML = "Error loading AI Models! " + err.message;
            loadingText.style.color = "red";
            setTimeout(startVideo, 2000); // Fail hone par bhi camera start karega
        });

        function fetchRegisteredFaces() {
            loadingText.innerHTML = "Fetching Sky Classes Students...";
            
            db.ref('Face_Data').once('value').then(snapshot => {
                const data = snapshot.val();
                if (!data) {
                    loadingText.innerHTML = "No students found in Database!";
                    setTimeout(startVideo, 1000);
                    return;
                }

                const labeledFaceDescriptors = [];
                
                for (const phone in data) {
                    const student = data[phone];
                    // SAFETY SHIELD: Sirf wahi data uthayega jo sahi format me hai
                    if (student && student.FaceDescriptor) {
                        try {
                            const floatArray = new Float32Array(Object.values(student.FaceDescriptor));
                            const label = student.Name + "||" + phone + "||" + (student.Parent_Phone || ""); 
                            labeledFaceDescriptors.push(new faceapi.LabeledFaceDescriptors(label, [floatArray]));
                        } catch (e) {
                            console.log("Kharab data chhod diya gaya: ", student.Name);
                        }
                    }
                }

                if(labeledFaceDescriptors.length > 0){
                    faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.5);
                }
                startVideo();
            }).catch(err => {
                loadingText.innerHTML = "Database Error!";
                setTimeout(startVideo, 1000);
            });
        }

        function startVideo() {
            loadingText.innerHTML = "Opening Camera...";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => { 
                    video.srcObject = stream; 
                    // Camera khulte hi loading screen hatayega
                    document.getElementById('loadingScreen').style.display = 'none';
                })
                .catch(err => {
                    loadingText.innerHTML = "Camera permission required!";
                    loadingText.style.color = "red";
                });
        }

        video.addEventListener('play', () => {
            // Backup hide
            document.getElementById('loadingScreen').style.display = 'none';
            
            const displaySize = { width: 350, height: 350 }; 
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                if (!faceMatcher) return;

                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                if(resizedDetections.length === 0) {
                    statusText.innerHTML = "<i class='fa-solid fa-face-viewfinder me-2'></i> Looking for students...";
                    statusText.style.color = "#E6B31E";
                    return;
                }

                resizedDetections.forEach((detection, i) => {
                    const result = faceMatcher.findBestMatch(detection.descriptor);
                    
                    if (result.label !== 'unknown') {
                        const splitData = result.label.split("||");
                        const name = splitData[0];
                        const phone = splitData[1];
                        const parentPhone = splitData[2];

                        const leftEye = detection.landmarks.getLeftEye();
                        const rightEye = detection.landmarks.getRightEye();
                        const ear = (calculateEAR(leftEye) + calculateEAR(rightEye)) / 2;

                        const scanKey = phone + "_" + currentMode;
                        const nowTime = Date.now();
                        
                        if (recentlyScanned[scanKey] && (nowTime - recentlyScanned[scanKey] < 300000)) {
                            statusText.innerHTML = `<i class='fa-solid fa-clock-rotate-left me-2'></i> ${name}, already marked!`;
                            statusText.style.color = "#ffc107";
                            return;
                        }

                        if (ear < 0.28) {
                            markAttendance(name, phone, parentPhone, scanKey);
                        } else {
                            statusText.innerHTML = `Face matched: ${name}. Please Blink!`;
                            statusText.style.color = "#00d2ff";
                        }

                    } else {
                        statusText.innerHTML = "<i class='fa-solid fa-user-secret me-2'></i> Unknown Face!";
                        statusText.style.color = "#D90429";
                    }
                });
            }, 200); 
        });

        function markAttendance(name, phone, parentPhone, scanKey) {
            recentlyScanned[scanKey] = Date.now(); 
            
            statusText.innerHTML = `<i class='fa-solid fa-circle-check me-2'></i> ${currentMode} SUCCESS: ${name}!`;
            statusText.style.color = "#28a745";

            speakAttendance(name);

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN'); 
            const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            db.ref('Daily_Attendance').push({
                Name: name,
                Phone: phone,
                Parent_Phone: parentPhone || "N/A",
                Date: dateStr,
                Time: timeStr,
                Timestamp: Date.now(),
                Method: "Face ID",
                GateMode: currentMode
            }).catch(err => console.error("Firebase Error: ", err));
        }
    </script>
</body>
</html>
