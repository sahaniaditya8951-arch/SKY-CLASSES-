<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Question Paper Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; padding: 30px; }
        .main-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 900px; margin: auto; }
        .header-title { color: #0A2540; font-weight: 800; border-bottom: 2px solid #E6B31E; padding-bottom: 10px; margin-bottom: 20px; }
        .form-control { border-radius: 8px; background: #f8fafc; border: 1px solid #ced4da; }
        .question-box { background: #fff; border: 1px solid #e2e8f0; border-left: 4px solid #0A2540; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .btn-add { background: #0A2540; color: white; font-weight: 600; }
        .btn-add:hover { background: #07192F; color: white; }
        .btn-generate { background: #D90429; color: white; font-weight: bold; font-size: 18px; padding: 12px; width: 100%; border-radius: 8px; margin-top: 20px; border: none; }
        .btn-generate:hover { background: #b00322; }
    </style>
</head>
<body>

    <div class="main-card">
        <h3 class="header-title"><i class="fa-solid fa-file-pen me-2"></i> Sky Classes - Paper Generator</h3>
        
        <div class="row mb-4">
            <div class="col-md-6 mb-3">
                <label class="fw-bold small text-muted">Exam Name (e.g., Weekly Test 1)</label>
                <input type="text" id="examName" class="form-control" placeholder="Enter Exam Name">
            </div>
            <div class="col-md-6 mb-3">
                <label class="fw-bold small text-muted">Class & Subject</label>
                <input type="text" id="subject" class="form-control" placeholder="e.g., Class 12 - Physics">
            </div>
            <div class="col-md-6 mb-3">
                <label class="fw-bold small text-muted">Total Marks</label>
                <input type="text" id="marks" class="form-control" placeholder="e.g., 50">
            </div>
            <div class="col-md-6 mb-3">
                <label class="fw-bold small text-muted">Time Allowed</label>
                <input type="text" id="time" class="form-control" placeholder="e.g., 2 Hours">
            </div>
        </div>

        <hr>
        <h5 class="fw-bold text-dark mb-3">Add Questions</h5>
        
        <div id="questionsContainer">
            </div>

        <div class="d-flex gap-2">
            <button class="btn btn-add w-100" onclick="addQuestion('subjective')"><i class="fa-solid fa-plus me-1"></i> Add Normal Question</button>
            <button class="btn btn-secondary w-100" onclick="addQuestion('mcq')"><i class="fa-solid fa-list me-1"></i> Add MCQ</button>
        </div>

        <button class="btn-generate" onclick="generatePaper()"><i class="fa-solid fa-print me-2"></i> Generate & Download PDF Paper</button>
    </div>

    <script>
        let questionCount = 0;

        // Function to add a new question input box
        function addQuestion(type) {
            questionCount++;
            const container = document.getElementById('questionsContainer');
            const div = document.createElement('div');
            div.className = 'question-box';
            div.id = `qbox_${questionCount}`;
            
            let html = `
                <div class="d-flex justify-content-between mb-2">
                    <label class="fw-bold text-primary">Question ${questionCount}</label>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeQuestion(${questionCount})"><i class="fa-solid fa-trash"></i></button>
                </div>
                <textarea class="form-control mb-2 q-text" rows="2" placeholder="Type your question here..."></textarea>
            `;

            if(type === 'mcq') {
                html += `
                    <div class="row g-2 q-options">
                        <div class="col-6"><input type="text" class="form-control form-control-sm opt-a" placeholder="Option A"></div>
                        <div class="col-6"><input type="text" class="form-control form-control-sm opt-b" placeholder="Option B"></div>
                        <div class="col-6"><input type="text" class="form-control form-control-sm opt-c" placeholder="Option C"></div>
                        <div class="col-6"><input type="text" class="form-control form-control-sm opt-d" placeholder="Option D"></div>
                    </div>
                `;
            }

            div.innerHTML = html;
            div.setAttribute('data-type', type);
            container.appendChild(div);
        }

        function removeQuestion(id) {
            document.getElementById(`qbox_${id}`).remove();
        }

        // Function to Generate PDF
        function generatePaper() {
            const examName = document.getElementById('examName').value || "MOCK TEST";
            const subject = document.getElementById('subject').value || "Subject";
            const marks = document.getElementById('marks').value || "100";
            const time = document.getElementById('time').value || "3 Hours";

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // --- HEADER ---
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("SKY CLASSES", 105, 20, null, null, "center");
            
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text("Gorakhpur's Premium Educational Institute", 105, 28, null, null, "center");
            
            doc.setLineWidth(0.5);
            doc.line(15, 32, 195, 32);

            // --- EXAM DETAILS ---
            doc.setFont("helvetica", "bold");
            doc.setFontSize(14);
            doc.text(examName.toUpperCase(), 105, 42, null, null, "center");
            
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text(`Subject: ${subject}`, 15, 52);
            doc.text(`Time: ${time}`, 15, 58);
            
            doc.text(`Total Marks: ${marks}`, 150, 52);
            doc.line(15, 62, 195, 62);

            // --- QUESTIONS ---
            let y = 72; // Starting vertical position
            doc.setFontSize(11);

            const boxes = document.querySelectorAll('.question-box');
            
            if(boxes.length === 0) {
                alert("Bhai, pehle questions toh add kar lo!");
                return;
            }

            boxes.forEach((box, index) => {
                const qText = box.querySelector('.q-text').value;
                const type = box.getAttribute('data-type');
                
                // Print Question
                doc.setFont("helvetica", "bold");
                doc.text(`Q${index + 1}.`, 15, y);
                doc.setFont("helvetica", "normal");
                
                // Wrap text if question is too long
                const splitText = doc.splitTextToSize(qText, 165);
                doc.text(splitText, 25, y);
                
                y += (splitText.length * 6); // Move down based on lines

                // Print Options if MCQ
                if(type === 'mcq') {
                    const optA = box.querySelector('.opt-a').value;
                    const optB = box.querySelector('.opt-b').value;
                    const optC = box.querySelector('.opt-c').value;
                    const optD = box.querySelector('.opt-d').value;
                    
                    y += 2;
                    doc.text(`(A) ${optA}`, 25, y);
                    doc.text(`(B) ${optB}`, 105, y);
                    y += 6;
                    doc.text(`(C) ${optC}`, 25, y);
                    doc.text(`(D) ${optD}`, 105, y);
                    y += 6;
                }

                y += 4; // Space between questions

                // Add new page if we run out of space
                if(y >= 280) {
                    doc.addPage();
                    y = 20;
                }
            });

            // Save PDF
            doc.save(`Sky_Classes_${subject}_Paper.pdf`);
        }
    </script>
</body>
</html>
