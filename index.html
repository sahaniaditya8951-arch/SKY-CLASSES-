<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Admission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #cc0000 !important; }
        .hero { background: #003366; color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid #cc0000; }
        .section-box { padding: 40px 20px; }
        .form-container { max-width: 500px; margin: auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .contact-info { text-align: center; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">SKY CLASSES</a>
        </div>
    </nav>

    <header class="hero">
        <h1 class="display-5 fw-bold">Sky Classes</h1>
        <p class="lead mb-1">Since 30 Years of Excellence in Education</p>
        <p class="mb-1"><strong>Director:</strong> Sandesh Samant</p>
        <p class="mb-0">📍 RS Tower, Khajanchi Chowk, Gorakhpur</p>
    </header>

    <div class="container mt-4">
        
        <section id="admission" class="section-box">
            <h2 class="text-center mb-4" style="color: #003366; font-weight: bold;">New Admission Registration</h2>
            
            <div class="form-container">
                <form id="admissionForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Student Full Name</label>
                        <input type="text" class="form-control" id="studentName" placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number</label>
                        <input type="tel" class="form-control" id="studentPhone" placeholder="10-digit mobile number" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Course</label>
                        <select class="form-select" id="courseSelect">
                            <option value="English Speaking (Competitive)">English Speaking (Competitive Exams)</option>
                            <option value="English Speaking (Board/Graduation)">English Speaking (Board/Graduation)</option>
                            <option value="Physics (11th/12th/NEET)">Physics (11th/12th/NEET)</option>
                            <option value="Chemistry (11th/12th/NEET)">Chemistry (11th/12th/NEET)</option>
                            <option value="Biology (11th/12th/NEET)">Biology (11th/12th/NEET)</option>
                        </select>
                    </div>
                    <button type="button" id="submitBtn" class="btn btn-danger w-100 fw-bold fs-5" onclick="submitAdmission()">Submit Form</button>
                </form>
                
                <div id="statusMessage" class="mt-3 text-center fw-bold text-success"></div>
            </div>

            <div class="contact-info">
                <p>📞 Call for Enquiry: 9453080133, 8840068514</p>
            </div>
        </section>

    </div>

    <script>
        // Yahan aapki Public Key daali gayi hai
        (function(){
            emailjs.init("RNJWSUbvZx9K-RKFm"); 
        })();

        function submitAdmission() {
            const name = document.getElementById('studentName').value;
            const phone = document.getElementById('studentPhone').value;
            const course = document.getElementById('courseSelect').value;
            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMessage');

            // Validation: Check agar field khali hai
            if(name === "" || phone === "") {
                alert("Kripya sabhi details bharein!");
                return;
            }

            // Button ko 'Sending...' me badalna taaki student ko pata chale process ho raha hai
            submitBtn.innerHTML = "Sending...";
            submitBtn.disabled = true;
            statusMsg.innerHTML = "";

            // EmailJS ke liye Data
            const templateParams = {
                name: name,
                phone: phone,
                course: course
            };

            // Yahan Service ID aur Template ID daali gayi hai
            emailjs.send('service_29mekw9', 'template_yrhieyg', templateParams)
                .then(function(response) {
                   console.log('SUCCESS!', response.status, response.text);
                   statusMsg.innerHTML = "🎉 Form successfully submitted! Aapko jaldi call aayega.";
                   statusMsg.className = "mt-3 text-center fw-bold text-success";
                   document.getElementById('admissionForm').reset();
                   submitBtn.innerHTML = "Submit Form";
                   submitBtn.disabled = false;
                }, function(error) {
                   console.log('FAILED...', error);
                   statusMsg.innerHTML = "❌ Kuch error aaya, form submit nahi hua.";
                   statusMsg.className = "mt-3 text-center fw-bold text-danger";
                   submitBtn.innerHTML = "Submit Form";
                   submitBtn.disabled = false;
                });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
