<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Smart Attendance</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #07192F, #0A2540); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin: 0;
        }
        .attendance-box {
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%; 
            max-width: 400px;
            text-align: center;
        }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .sky { color: #0A2540; } .classes { color: #D90429; }
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 20px; border: 2px solid #e2e8f0; background: #f8fafc;}
        .form-control:focus { border-color: #E6B31E; box-shadow: none; background: white;}
        .btn-present { 
            background: #28a745; color: white; width: 100%; padding: 15px; 
            border-radius: 10px; font-weight: 700; font-size: 18px; border: none; transition: 0.3s;
        }
        .btn-present:hover { background: #218838; transform: translateY(-2px); }
        .success-mark { display: none; color: #28a745; font-size: 60px; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="attendance-box" id="mainBox">
        <div class="logo"><span class="sky">SKY</span> <span class="classes">CLASSES</span></div>
        <h5 class="text-muted fw-bold mb-4">Daily Attendance Portal</h5>
        
        <div id="formSection">
            <input type="text" id="studentName" class="form-control" placeholder="Enter Your Full Name" required>
            <input type="tel" id="studentPhone" class="form-control" placeholder="Registered Mobile Number" required>
            
            <button class="btn-present" id="submitBtn" onclick="markAttendance()">
                <i class="fa-solid fa-hand-sparkles me-2"></i> Mark Present
            </button>
            <p id="errorMsg" class="text-danger small fw-bold mt-3" style="display: none;">Please fill all details correctly!</p>
        </div>

        <div id="successSection" style="display: none;">
            <i class="fa-solid fa-circle-check success-mark" style="display: inline-block;"></i>
            <h4 class="fw-bold text-dark">Attendance Marked!</h4>
            <p class="text-muted small">Have a great learning session.</p>
        </div>
    </div>

    <script>
        // Firebase Setup
        const firebaseConfig = {
          apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
          authDomain: "sky-classes-db-d6140.firebaseapp.com",
          databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
          projectId: "sky-classes-db-d6140",
          storageBucket: "sky-classes-db-d6140.firebasestorage.app",
          messagingSenderId: "915411828634",
          appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function markAttendance() {
            const name = document.getElementById('studentName').value;
            const phone = document.getElementById('studentPhone').value;
            const btn = document.getElementById('submitBtn');
            const error = document.getElementById('errorMsg');

            if(!name || !phone || phone.length < 10) {
                error.style.display = 'block';
                return;
            }

            error.style.display = 'none';
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Verifying...";
            btn.disabled = true;

            // Date and Time Logic
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN'); // DD/MM/YYYY format
            const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            // Saving to Firebase under 'Daily_Attendance'
            db.ref('Daily_Attendance').push({
                Name: name,
                Phone: phone,
                Date: dateStr,
                Time: timeStr,
                Timestamp: Date.now()
            }).then(() => {
                // Show Success Screen
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';
            }).catch((err) => {
                error.innerText = "Network Error. Please try again.";
                error.style.display = 'block';
                btn.innerHTML = "<i class='fa-solid fa-hand-sparkles me-2'></i> Mark Present";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
