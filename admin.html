<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Central Admin Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary-dark: #07192F; --primary-blue: #0A2540; --accent-gold: #E6B31E; --accent-red: #D90429; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; margin: 0; overflow-x: hidden; }
        
        /* Login Screen */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue)); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-login { background: var(--accent-red); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; }
        
        /* Dashboard Sidebar */
        #dashboardScreen { display: none; }
        .sidebar { height: 100vh; background-color: var(--primary-dark); color: white; padding-top: 20px; position: fixed; width: 260px; z-index: 100; }
        .sidebar h4 { text-align: center; font-weight: 800; color: var(--accent-gold); margin-bottom: 30px; }
        .sidebar a { padding: 15px 25px; text-decoration: none; color: #a0aec0; display: block; border-left: 4px solid transparent; cursor: pointer; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.05); color: white; border-left-color: var(--accent-gold); }
        
        .main-content { margin-left: 260px; padding: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); text-align: center; border-bottom: 5px solid var(--primary-blue); }
        .table-container { background: white; padding: 25px; border-radius: 15px; margin-top: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); display: none; }
        .active-section { display: block; }
        
        .btn-excel { background: #28a745; color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 600; white-space: nowrap; }
        .badge-time { background: #fff3cd; color: #856404; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 600; }
        .date-picker { border: 2px solid #e2e8f0; border-radius: 8px; padding: 6px 12px; outline: none; font-weight: 500; color: #0A2540;}
        .date-picker:focus { border-color: var(--accent-gold); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h3 class="fw-bold"><span style="color: var(--accent-red);">SKY</span> ADMIN</h3>
            <input type="password" id="adminPassword" class="form-control mb-3 text-center" placeholder="Master Password">
            <button class="btn-login" onclick="checkPassword()">LOGIN</button>
        </div>
    </div>

    <div id="dashboardScreen">
        <div class="sidebar">
            <h4>SKY CLASSES</h4>
            <a onclick="showSection('admissions')" id="link-admissions" class="active"><i class="fa-solid fa-user-plus me-2"></i> Admissions</a>
            <a onclick="showSection('attendance')" id="link-attendance"><i class="fa-solid fa-calendar-check me-2"></i> Attendance Log</a>
            <a onclick="logout()" style="color: #ff4d4d; margin-top: 50px;"><i class="fa-solid fa-lock me-2"></i> Lock Dashboard</a>
        </div>

        <div class="main-content">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="stat-card">
                        <h2 id="countAdmissions">0</h2>
                        <p class="text-muted fw-bold mb-0">Total Admissions</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="stat-card" style="border-color: #28a745;">
                        <h2 id="countAttendance">0</h2>
                        <p class="text-muted fw-bold mb-0" id="attendanceCardLabel">Selected Date Attendance</p>
                    </div>
                </div>
            </div>

            <div id="section-admissions" class="table-container active-section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0 text-primary">Admission Inquiries</h5>
                    <button class="btn-excel" onclick="downloadCSV('admissions')"><i class="fa-solid fa-download me-2"></i> Excel</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr><th>Date</th><th>Name</th><th>Phone</th><th>Course</th></tr>
                        </thead>
                        <tbody id="admissionsBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-attendance" class="table-container">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <h5 class="fw-bold m-0 text-success">Daily Attendance Log</h5>
                    <div class="d-flex gap-2 align-items-center">
                        <span class="text-muted fw-bold small">Filter Date:</span>
                        <input type="date" id="dateFilter" class="date-picker" onchange="filterAttendanceData()">
                        <button class="btn-excel" style="background: #17a2b8;" onclick="downloadCSV('attendance')">
                            <i class="fa-solid fa-file-csv me-2"></i> Download Excel
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr><th>Date</th><th>Time</th><th>Method</th><th>Student Name</th><th>Phone</th></tr>
                        </thead>
                        <tbody id="attendanceBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password logic
        function checkPassword() {
            if(document.getElementById('adminPassword').value === "SkyAdmin123") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                setDefaultDate();
                startRealtimeData();
            } else { alert("Wrong Password!"); }
        }

        function logout() { location.reload(); }

        // Section Toggler
        function showSection(id) {
            document.querySelectorAll('.table-container').forEach(el => el.classList.remove('active-section'));
            document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active-section');
            document.getElementById('link-' + id).classList.add('active');
        }

        // Set Today's date automatically in the filter
        function setDefaultDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('dateFilter').value = `${yyyy}-${mm}-${dd}`;
        }

        // Convert YYYY-MM-DD to DD/MM/YYYY (Indian format used in Firebase)
        function formatInputDate(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`; // DD/MM/YYYY
        }

        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
          authDomain: "sky-classes-db-d6140.firebaseapp.com",
          databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
          projectId: "sky-classes-db-d6140",
          storageBucket: "sky-classes-db-d6140.firebasestorage.app",
          messagingSenderId: "915411828634",
          appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let admissionsList = [];
        let allAttendanceList = []; // Firebase se aaya saara data
        let filteredAttendanceList = []; // Sirf select ki hui date ka data

        function startRealtimeData() {
            // Fetch Admissions
            db.ref('Student_Admissions').on('value', snap => {
                const data = snap.val();
                const body = document.getElementById('admissionsBody');
                body.innerHTML = ''; admissionsList = [];
                if(data) {
                    Object.values(data).reverse().forEach(st => {
                        admissionsList.push(st);
                        body.innerHTML += `<tr><td>${st.Date}</td><td class="fw-bold">${st.Name}</td><td>${st.Phone}</td><td><span class="badge bg-light text-dark">${st.Course}</span></td></tr>`;
                    });
                }
                document.getElementById('countAdmissions').innerText = admissionsList.length;
            });

            // Fetch Daily Attendance
            db.ref('Daily_Attendance').on('value', snap => {
                const data = snap.val();
                allAttendanceList = [];
                if(data) {
                    Object.values(data).reverse().forEach(at => {
                        allAttendanceList.push(at);
                    });
                }
                filterAttendanceData(); // Data aane par turant filter apply karo
            });
        }

        // Smart Filter Function
        function filterAttendanceData() {
            const selectedDateVal = document.getElementById('dateFilter').value;
            const targetFormat1 = formatInputDate(selectedDateVal); // "DD/MM/YYYY"
            
            // Single digit dates ko handle karne ke liye (e.g. 05/04 vs 5/4)
            const parts = selectedDateVal.split('-');
            const targetFormat2 = `${parseInt(parts[2])}/${parseInt(parts[1])}/${parts[0]}`; 

            const body = document.getElementById('attendanceBody');
            body.innerHTML = '';
            filteredAttendanceList = [];

            allAttendanceList.forEach(at => {
                // Check if attendance date matches selected date
                if(at.Date === targetFormat1 || at.Date === targetFormat2) {
                    filteredAttendanceList.push(at);
                    const method = at.Method ? at.Method : 'Manual'; // Face ID or Manual
                    const methodBadge = method === 'Face ID' ? `<span class="badge bg-success"><i class="fa-solid fa-face-smile me-1"></i> Face ID</span>` : `<span class="badge bg-secondary"><i class="fa-solid fa-keyboard me-1"></i> Form</span>`;
                    
                    body.innerHTML += `
                        <tr>
                            <td>${at.Date}</td>
                            <td><span class="badge-time">${at.Time}</span></td>
                            <td>${methodBadge}</td>
                            <td class="fw-bold text-dark">${at.Name}</td>
                            <td>${at.Phone}</td>
                        </tr>
                    `;
                }
            });

            // Update Header Count
            document.getElementById('countAttendance').innerText = filteredAttendanceList.length;
            
            // Update Label Text (Today vs Selected)
            const todayStr = formatInputDate(document.getElementById('dateFilter').defaultValue);
            if(targetFormat1 === todayStr) {
                document.getElementById('attendanceCardLabel').innerText = "Today's Attendance";
            } else {
                document.getElementById('attendanceCardLabel').innerText = `Attendance for ${targetFormat1}`;
            }

            if(filteredAttendanceList.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="text-center text-danger fw-bold py-4">No attendance found for selected date.</td></tr>`;
            }
        }

        function downloadCSV(type) {
            // Agar attendance select hai, toh sirf filtered wali list download hogi
            let data = type === 'admissions' ? admissionsList : filteredAttendanceList;
            if(data.length === 0) { alert("No data to download for this selection!"); return; }
            
            let csv = type === 'admissions' ? "Date,Name,Phone,Course\n" : "Date,Time,Method,Name,Phone\n";
            data.forEach(row => {
                if(type === 'admissions') {
                    csv += `"${row.Date}","${row.Name}","${row.Phone}","${row.Course}"\n`;
                } else {
                    const method = row.Method ? row.Method : 'Manual';
                    csv += `"${row.Date}","${row.Time}","${method}","${row.Name}","${row.Phone}"\n`;
                }
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            
            // Excel file ke naam mein Date jodna
            const dateSuf = type === 'attendance' ? document.getElementById('dateFilter').value : new Date().toLocaleDateString();
            link.download = `Sky_${type}_${dateSuf}.csv`;
            
            link.click();
        }
    </script>
</body>
</html>
