<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Smart Fee Receipt</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; padding: 40px 20px; }
        .receipt-card { 
            background: white; border-radius: 20px; padding: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: auto; 
        }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .logo-text { font-size: 32px; font-weight: 800; color: #0A2540; }
        .logo-text span { color: #D90429; }
        .form-label { font-weight: 600; color: #4b5563; font-size: 14px; }
        .form-control { border-radius: 8px; padding: 12px; background: #f8fafc; border: 1px solid #ced4da; }
        .form-control:focus { border-color: #0A2540; box-shadow: 0 0 5px rgba(10, 37, 64, 0.2); }
        .btn-print { 
            background: #0A2540; color: white; padding: 15px; border-radius: 10px; 
            width: 100%; font-weight: 700; font-size: 16px; border: none; transition: 0.3s; 
        }
        .btn-print:hover { background: #D90429; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(217, 4, 41, 0.3); }
        #syncStatus { font-size: 12px; font-weight: bold; color: #28a745; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="receipt-card">
        <div class="header">
            <div class="logo-text">SKY <span>CLASSES</span></div>
            <p class="text-muted small">Smart Fee Receipt Generator</p>
        </div>
        
        <div id="syncStatus"><i class="fa-solid fa-rotate fa-spin me-1"></i> Syncing student database...</div>
        
        <div class="mb-3">
            <label class="form-label">Student Name (Auto-Search)</label>
            <input type="text" id="name" class="form-control" list="studentList" placeholder="Start typing name..." autocomplete="off">
            <datalist id="studentList">
                </datalist>
        </div>
        
        <div class="row mb-3">
            <div class="col-md-6 mb-3 mb-md-0">
                <label class="form-label">Course / Batch</label>
                <input type="text" id="course" class="form-control" placeholder="e.g. Physics Class 12">
            </div>
            <div class="col-md-6">
                <label class="form-label">Amount Paid (₹)</label>
                <input type="number" id="amount" class="form-control" placeholder="Enter custom amount">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Payment Mode</label>
            <select id="mode" class="form-control">
                <option>Cash</option>
                <option>UPI / PhonePe / GPay</option>
                <option>Bank Transfer</option>
            </select>
        </div>
        
        <button class="btn-print" onclick="generateReceipt()"><i class="fa-solid fa-file-pdf me-2"></i> Generate & Download PDF</button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
          authDomain: "sky-classes-db-d6140.firebaseapp.com",
          databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
          projectId: "sky-classes-db-d6140",
          storageBucket: "sky-classes-db-d6140.firebasestorage.app",
          messagingSenderId: "915411828634",
          appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Fetch Students from 'Face_Data' for Auto-Complete
        const datalist = document.getElementById('studentList');
        const syncStatus = document.getElementById('syncStatus');

        db.ref('Face_Data').once('value').then(snapshot => {
            const data = snapshot.val();
            if(data) {
                for (const phone in data) {
                    const studentName = data[phone].Name;
                    const option = document.createElement('option');
                    // We attach phone number in bracket to distinguish same names (e.g. Rahul (9876543210))
                    option.value = studentName + " (" + phone + ")"; 
                    datalist.appendChild(option);
                }
                syncStatus.innerHTML = "<i class='fa-solid fa-circle-check me-1'></i> Database Synced & Ready!";
            } else {
                syncStatus.innerHTML = "<i class='fa-solid fa-circle-exclamation me-1' style='color:#D90429;'></i> No students found in database.";
            }
        }).catch(err => {
            syncStatus.innerHTML = "Database Connection Error!";
            syncStatus.style.color = "#D90429";
        });

        // 2. PDF Generator Logic
        function generateReceipt() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // If name has phone number like "Rahul (9876543210)", extract just the name for receipt
            let rawName = document.getElementById('name').value;
            let cleanName = rawName.split(" (")[0]; 

            const course = document.getElementById('course').value || 'General';
            const amt = document.getElementById('amount').value;
            const mode = document.getElementById('mode').value;
            
            if(!cleanName || !amt) { alert("Bhai, Name aur Amount daalna zaroori hai!"); return; }

            // Blue Header
            doc.setFillColor(10, 37, 64);
            doc.rect(0, 0, 210, 45, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(30);
            doc.text("SKY CLASSES", 105, 22, null, null, "center");
            
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text("Gorakhpur's Premium Educational Institute", 105, 32, null, null, "center");
            
            // Receipt Details
            doc.setTextColor(217, 4, 41);
            doc.setFontSize(18);
            doc.setFont("helvetica", "bold");
            doc.text("OFFICIAL FEE RECEIPT", 105, 65, null, null, "center");
            
            doc.setDrawColor(200, 200, 200);
            doc.setLineWidth(0.5);
            doc.rect(20, 80, 170, 80);

            doc.setTextColor(0);
            doc.setFontSize(12);
            const today = new Date().toLocaleDateString('en-IN');
            const receiptID = "SKY" + Math.floor(1000 + Math.random() * 9000);
            
            doc.setFont("helvetica", "normal");
            doc.text(`Receipt No: `, 30, 95);
            doc.setFont("helvetica", "bold"); doc.text(receiptID, 70, 95);
            
            doc.setFont("helvetica", "normal");
            doc.text(`Date: `, 130, 95);
            doc.setFont("helvetica", "bold"); doc.text(today, 150, 95);
            
            doc.line(20, 102, 190, 102); 
            
            doc.setFont("helvetica", "normal");
            doc.text(`Received from : `, 30, 115);
            doc.setFont("helvetica", "bold"); doc.text(cleanName.toUpperCase(), 75, 115);
            
            doc.setFont("helvetica", "normal");
            doc.text(`Course Name  : `, 30, 128);
            doc.setFont("helvetica", "bold"); doc.text(course, 75, 128);
            
            doc.setFont("helvetica", "normal");
            doc.text(`Payment Mode : `, 30, 141);
            doc.setFont("helvetica", "bold"); doc.text(mode, 75, 141);

            // Amount Box Highlight
            doc.setFillColor(245, 245, 245);
            doc.rect(130, 130, 50, 15, 'FD');
            doc.setFontSize(14);
            doc.setTextColor(217, 4, 41);
            doc.text(`Rs. ${amt} /-`, 140, 140);
            
            // Signature Line
            doc.setTextColor(0);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("-----------------------------------", 155, 185, null, null, "center");
            doc.text("Authorized Signatory", 155, 190, null, null, "center");
            
            // Save PDF
            doc.save(`SkyClasses_Receipt_${cleanName}.pdf`);
            
            // Reset Form
            document.getElementById('name').value = '';
            document.getElementById('amount').value = '';
        }
    </script>
</body>
</html>
