<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | AI Face Registration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #07192F, #0A2540); 
            min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; padding: 20px; margin: 0;
        }
        .scanner-box {
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; color: #333;
        }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .sky { color: #0A2540; } .classes { color: #D90429; }
        
        .camera-container {
            position: relative; width: 100%; max-width: 320px; height: 240px; 
            margin: 0 auto 20px; border-radius: 15px; overflow: hidden;
            border: 4px solid #E6B31E; background: #000;
        }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 15px; background: #f8fafc;}
        .btn-scan { 
            background: #0A2540; color: white; width: 100%; padding: 15px; 
            border-radius: 10px; font-weight: 700; font-size: 16px; border: none; transition: 0.3s;
        }
        .btn-scan:hover { background: #D90429; }
        
        #statusText { font-weight: 600; margin-bottom: 15px; color: #D90429; }
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(7,25,47,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingScreen">
        <i class="fa-solid fa-microchip fa-spin" style="font-size: 50px; color: #E6B31E; margin-bottom: 20px;"></i>
        <h3 class="fw-bold">Initializing Sky AI...</h3>
        <p class="text-muted">Loading Face Recognition Neural Networks</p>
    </div>

    <div class="scanner-box">
        <div class="logo"><span class="sky">SKY</span> <span class="classes">CLASSES</span></div>
        <h5 class="text-muted fw-bold mb-4">Student Face Registration</h5>
        
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <p id="statusText"><i class="fa-solid fa-camera me-2"></i> Look straight into the camera</p>

        <input type="text" id="studentName" class="form-control" placeholder="Enter Student Name" required>
        <input type="tel" id="studentPhone" class="form-control" placeholder="Enter Phone Number" required>
        
        <button class="btn-scan" id="registerBtn" onclick="registerFace()">
            <i class="fa-solid fa-face-viewfinder me-2"></i> Capture & Register Face
        </button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
          authDomain: "sky-classes-db-d6140.firebaseapp.com",
          databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
          projectId: "sky-classes-db-d6140",
          storageBucket: "sky-classes-db-d6140.firebasestorage.app",
          messagingSenderId: "915411828634",
          appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('video');
        const statusText = document.getElementById('statusText');
        const registerBtn = document.getElementById('registerBtn');

        // Step 1: Load AI Models (from secure CDN)
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        
        Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(startVideo).catch(err => {
            console.error(err);
            statusText.innerHTML = "Error loading AI Models. Please check connection.";
        });

        // Step 2: Start Webcam
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    video.srcObject = stream;
                    document.getElementById('loadingScreen').style.display = 'none'; // Hide loading
                    statusText.innerHTML = "<i class='fa-solid fa-check-circle text-success me-2'></i> AI Ready. Please enter details.";
                })
                .catch(err => {
                    console.error(err);
                    statusText.innerHTML = "Camera permission denied!";
                });
        }

        // Step 3: Capture and Register
        async function registerFace() {
            const name = document.getElementById('studentName').value;
            const phone = document.getElementById('studentPhone').value;

            if(!name || !phone) {
                alert("Please enter Name and Phone number first!");
                return;
            }

            registerBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin me-2'></i> Scanning Face...";
            registerBtn.disabled = true;

            // Detect Face and extract the unique 128 data points (descriptor)
            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

            if (!detection) {
                statusText.innerHTML = "<i class='fa-solid fa-triangle-exclamation text-danger me-2'></i> No face detected! Please look at the camera.";
                resetButton();
                return;
            }

            // Convert descriptor to a normal array to save in Firebase
            const faceDataArray = Array.from(detection.descriptor);

            // Save to Firebase under 'Face_Data'
            db.ref('Face_Data/' + phone).set({
                Name: name,
                Phone: phone,
                FaceDescriptor: faceDataArray, // AI numerical data of the face
                RegisteredAt: new Date().toLocaleString()
            }).then(() => {
                statusText.innerHTML = `<i class='fa-solid fa-shield-check text-success me-2'></i> Face registered for ${name}!`;
                statusText.style.color = "#28a745";
                document.getElementById('studentName').value = '';
                document.getElementById('studentPhone').value = '';
                resetButton();
                alert("Face ID Registered Successfully! ✅");
            }).catch(error => {
                console.error("Firebase Error: ", error);
                statusText.innerHTML = "Error saving data. Try again.";
                resetButton();
            });
        }

        function resetButton() {
            registerBtn.innerHTML = "<i class='fa-solid fa-face-viewfinder me-2'></i> Capture & Register Face";
            registerBtn.disabled = false;
        }
    </script>
</body>
</html>
