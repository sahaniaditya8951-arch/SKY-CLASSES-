<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Classes | Fast AI Face Registration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #07192F, #0A2540); 
            min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; padding: 20px; margin: 0;
        }
        .scanner-box {
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; color: #333;
        }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .sky { color: #0A2540; } .classes { color: #D90429; }
        
        .camera-container {
            position: relative; width: 100%; max-width: 320px; height: 320px;
            margin: 0 auto 20px; border-radius: 15px; overflow: hidden;
            border: 4px solid #E6B31E; background: #000;
        }
        /* Mirror Fix */
        video, canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 15px; background: #f8fafc; font-weight: 500;}
        .btn-scan { 
            background: #0A2540; color: white; width: 100%; padding: 15px; 
            border-radius: 10px; font-weight: 700; font-size: 16px; border: none; transition: 0.3s;
        }
        .btn-scan:hover { background: #D90429; }
        
        #statusText { font-weight: 600; margin-bottom: 15px; color: #D90429; }
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(7,25,47,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingScreen">
        <i class="fa-solid fa-bolt fa-bounce" style="font-size: 50px; color: #E6B31E; margin-bottom: 20px;"></i>
        <h3 class="fw-bold">Starting Lightning AI...</h3>
        <p class="text-white text-center px-4">Loading Fast Face Detector. Just a second!</p>
    </div>

    <div class="scanner-box">
        <div class="logo"><span class="sky">SKY</span> <span class="classes">CLASSES</span></div>
        <h5 class="text-muted fw-bold mb-4">Fast Student Registration</h5>
        
        <div class="camera-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <p id="statusText"><i class="fa-solid fa-camera me-2"></i> Wait for the Blue Box on your face...</p>

        <input type="text" id="studentName" class="form-control" placeholder="Student Full Name" required>
        <input type="tel" id="studentPhone" class="form-control" placeholder="10-Digit Mobile Number" required>
        <input type="tel" id="parentPhone" class="form-control" placeholder="Parent's Mobile Number" required>
        
        <button class="btn-scan" id="registerBtn" onclick="registerFace()" disabled>
            <i class="fa-solid fa-face-viewfinder me-2"></i> Waiting for Face Lock...
        </button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyC6bcqETEnTjLEQnISXjnWR2brPrVOAm-Y",
          authDomain: "sky-classes-db-d6140.firebaseapp.com",
          databaseURL: "https://sky-classes-db-d6140-default-rtdb.firebaseio.com",
          projectId: "sky-classes-db-d6140",
          storageBucket: "sky-classes-db-d6140.firebasestorage.app",
          messagingSenderId: "915411828634",
          appId: "1:915411828634:web:44aadc81aa911cdebcc423"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('statusText');
        const registerBtn = document.getElementById('registerBtn');

        // Yahan 'tinyFaceDetector' lagaya hai jo bohot fast hai
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        
        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]).then(startVideo).catch(err => {
            console.error(err);
            statusText.innerHTML = "Error loading AI. Please refresh the page.";
        });

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(err => {
                    console.error(err);
                    statusText.innerHTML = "Camera permission denied!";
                });
        }

        video.addEventListener('play', () => {
            document.getElementById('loadingScreen').style.display = 'none';
            
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            // Har 0.2 second me scan karega (Fast detection)
            setInterval(async () => {
                // TinyFaceDetector options use kar rahe hain
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (detection) {
                    statusText.innerHTML = "<i class='fa-solid fa-lock text-success me-2'></i> Face Locked! You can Register now.";
                    statusText.style.color = "#28a745";
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = "<i class='fa-solid fa-camera me-2'></i> Capture & Save Data";
                    registerBtn.style.background = "#28a745"; 
                    
                    const resizedDetection = faceapi.resizeResults(detection, displaySize);
                    faceapi.draw.drawDetections(canvas, resizedDetection);
                } else {
                    statusText.innerHTML = "<i class='fa-solid fa-spinner fa-spin text-warning me-2'></i> Align your face in the center...";
                    statusText.style.color = "#E6B31E";
                    registerBtn.disabled = true;
                    registerBtn.innerHTML = "<i class='fa-solid fa-face-viewfinder me-2'></i> Waiting for Face Lock...";
                    registerBtn.style.background = "#0A2540";
                }
            }, 200); 
        });

        async function registerFace() {
            const name = document.getElementById('studentName').value;
            const phone = document.getElementById('studentPhone').value;
            const parentPhone = document.getElementById('parentPhone').value;

            if(!name || phone.length < 10) {
                alert("Please fill student details correctly!");
                return;
            }

            registerBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin me-2'></i> Generating AI Face ID...";
            registerBtn.disabled = true;

            // Final Fast Scan
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            if (!detection) {
                alert("Face lock lost! Please look at the camera again.");
                registerBtn.disabled = false;
                registerBtn.innerHTML = "<i class='fa-solid fa-camera me-2'></i> Capture & Save Data";
                return;
            }

            const faceDataArray = Array.from(detection.descriptor);

            db.ref('Face_Data/' + phone).set({
                Name: name,
                Phone: phone,
                Parent_Phone: parentPhone || "N/A",
                FaceDescriptor: faceDataArray,
                RegisteredAt: new Date().toLocaleString()
            }).then(() => {
                alert("Face ID Registered Successfully! ✅");
                document.getElementById('studentName').value = '';
                document.getElementById('studentPhone').value = '';
                document.getElementById('parentPhone').value = '';
            }).catch(error => {
                console.error("Firebase Error: ", error);
                alert("Database Error! Check internet connection.");
            });
        }
    </script>
</body>
</html>
